name: Coordination -- dev branch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semantic version bump to apply on dev"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: coordination-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/step_linter.yml

  unit:
    name: unit
    needs: lint
    uses: ./.github/workflows/step_pytest-unit.yml

  bump_version:
    name: bump_version
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    permissions:
      contents: write
    uses: ./.github/workflows/step_bump_version.yml
    with:
      target_branch: dev
      bump_type: ${{ inputs.bump_type }}