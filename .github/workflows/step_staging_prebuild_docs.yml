name: Docs -- Build and publish prebuilt to RtD

on:
  workflow_call:
    inputs:
      target_ref:
        description: "Git ref to build documentation from"
        required: true
        type: string
      rtd_project:
        description: "Read the Docs project slug"
        required: true
        type: string
      rtd_version:
        description: "Read the Docs version to trigger"
        required: true
        type: string
    secrets:
      APP_PRIVATE_KEY:
        required: true
      NRV_TOKEN_GITHUB:
        required: true
      RTD_TOKEN:
        required: true

permissions:
  contents: write

concurrency:
  group: docs-${{ inputs.target_ref }}
  cancel-in-progress: true

jobs:
  build_docs:
    name: build_docs
    runs-on: self-hosted

    env:
      MAMBA_ROOT_PREFIX: /home/runner/micromamba
      ENV_NAME: nrv-docs
      RTD_PROJECT: ${{ inputs.rtd_project }}
      RTD_VERSION: ${{ inputs.rtd_version }}

    steps:
        # - These steps allows action to push on dev branch -
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # ----------------------------------------------------


      - name: Check micromamba
        run: |
          echo "MAMBA_ROOT_PREFIX=$MAMBA_ROOT_PREFIX"
          micromamba info

      - name: Create or update docs environment
        run: |
          if micromamba env list | grep -qE "(^|[[:space:]])${ENV_NAME}([[:space:]]|$)"; then
            micromamba env update -n "${ENV_NAME}" -f conda/nrvdoc_linux.yaml
          else
            micromamba create -y -n "${ENV_NAME}" -f conda/nrvdoc_linux.yaml
          fi

      - name: Build documentation
        run: |
          set -euo pipefail
          rm -rf docs/html docs/examples docs/tutorials docs/_nrv
          mkdir -p docs/html
          micromamba run -n "${ENV_NAME}" python3 -m sphinx.cmd.build -b html -j 4 docs/ docs/html/
          rm -rf docs/examples docs/tutorials docs/_nrv

        # - New authentification on app required as build doc is long -
      - name: Generate fresh GitHub App token for push
        uses: actions/create-github-app-token@v1
        id: app-token-push
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID for push
        id: get-user-id-push
        run: echo "user-id=$(gh api "/users/${{ steps.app-token-push.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token-push.outputs.token }}

      - name: Configure git identity for push
        run: |
          git config --global user.name '${{ steps.app-token-push.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id-push.outputs.user-id }}+${{ steps.app-token-push.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Commit prebuilt documentation
        id: commit_docs
        run: |
          set -euo pipefail
          git add docs/html
          git commit -m "docs: update prebuilt documentation [skip ci]"
          git push origin HEAD:${{ inputs.target_ref }}
        # ----------------------------------------------------

      - name: Trigger Read the Docs build
        run: |
          echo "Copying docs on https://app.readthedocs.org/api/v3/projects/${RTD_PROJECT}/versions/${RTD_VERSION}/builds/"
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            "https://app.readthedocs.org/api/v3/projects/${RTD_PROJECT}/versions/${RTD_VERSION}/builds/"