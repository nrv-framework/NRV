name: Pytest -- Run deployment tests

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: pytest-deployment-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment:
    name: deployment_test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Miniconda with mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-variant: Miniforge3
          mamba-version: "*"
          auto-activate-base: false

      - name: Prepare Linux test environment file
        shell: bash -el {0}
        run: |
          cp conda/docs-env.yaml /tmp/docs-env-ci.yaml
          sed -i '/libblas=\*=.*blis/d' /tmp/docs-env-ci.yaml

      - name: Create conda environment
        shell: bash -el {0}
        run: |
          mamba env create -f /tmp/docs-env-ci.yaml

      - name: Extract package metadata
        id: pkg
        shell: bash -el {0}
        run: |
          PKG_NAME=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["name"])
          PY
          )
          PKG_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )
          echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install pytest
        shell: bash -el {0}
        run: |
          conda run -n nrv-docs python -m pip install --upgrade pip pytest

      - name: Install package from TestPyPI
        shell: bash -el {0}
        run: |
          for i in 1 2 3 4 5 6; do
            conda run -n nrv-docs python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              --no-cache-dir \
              "${{ steps.pkg.outputs.name }}==${{ steps.pkg.outputs.version }}" && break
            echo "Package not available yet on TestPyPI, retry $i/6..."
            sleep 20
          done

      - name: Show installed package
        shell: bash -el {0}
        run: |
          conda run -n nrv-docs python -m pip show "${{ steps.pkg.outputs.name }}"

      - name: Run deployment tests
        shell: bash -el {0}
        run: |
          conda run -n nrv-docs python -m pytest tests/deployment -q