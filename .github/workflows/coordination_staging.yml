name: Coordination -- staging branch

on:
  pull_request:
    branches:
      - staging
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - staging
  merge_group:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: coordination-staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  unit:
    name: unit
    uses: ./.github/workflows/step_staging_pytest-unit.yml

  e2e:
    name: e2e
    needs: unit
    uses: ./.github/workflows/step_staging_pytest-e2e.yml

  docs_latest:
    name: docs_latest
    needs: e2e
    uses: ./.github/workflows/step_staging_prebuild_docs.yml
    with:
      target_ref: staging
      rtd_project: nrv
      rtd_version: latest
    secrets: inherit

  publish_testpypi:
    name: publish_testpypi
    needs: docs_latest
    uses: ./.github/workflows/step_staging_testpypi_release.yml
    secrets: inherit

  deployment_test:
    name: deployment_test
    needs: publish_testpypi
    uses: ./.github/workflows/step_staging_pytest-deployment.yml

  promote_to_master_pr:
    name: promote_to_master_pr
    needs: deployment_test
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR staging -> master
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'staging';
            const base = 'master';

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base
            });

            if (prs.data.length > 0) {
              core.info(`PR already exists: #${prs.data[0].number}`);
              core.setOutput('pr_number', prs.data[0].number.toString());
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: 'Promote staging to master',
              body: [
                'Automated promotion after successful staging qualification pipeline.',
                '',
                '- unit tests passed',
                '- end-to-end tests passed',
                '- Docs latest with tutos and example generated',
                '- TestPyPI publication passed',
                '- deployment tests passed'
              ].join('\n')
            });

            core.setOutput('pr_number', created.data.number.toString());

  enable_auto_merge:
    name: enable_auto_merge
    needs: promote_to_master_pr
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge on promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.promote_to_master_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --merge
          fi