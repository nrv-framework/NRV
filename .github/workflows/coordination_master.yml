name: Coordination -- master branch

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coordination-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    name: prepare_release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Access release tag from pyproject.toml
        id: meta
        shell: bash
        run: |
          RELEASE_TAG=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print("v" + data["project"]["version"])
          PY
          )
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if missing
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"
          git fetch --tags
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

  publish_pypi:
    name: publish_pypi
    needs: prepare_release
    uses: ./.github/workflows/step_master_pypi_release.yml
    with:
      git_ref: ${{ needs.prepare_release.outputs.release_tag }}
    secrets: inherit

  create_release:
    name: create_release
    needs:
      - prepare_release
      - publish_pypi
    uses: ./.github/workflows/step_master_create_release.yml
    with:
      release_tag: ${{ needs.prepare_release.outputs.release_tag }}
    secrets: inherit

  publish_stable_docs:
    name: publish_stable_docs
    needs:
      - prepare_release
      - create_release
    uses: ./.github/workflows/step_master_publish_stable_docs.yml
    with:
      release_tag: ${{ needs.prepare_release.outputs.release_tag }}
      rtd_project: nrv
    secrets: inherit

  docker_images:
    name: docker_images
    needs:
      - prepare_release
      - create_release
    uses: ./.github/workflows/step_master_docker-image.yml
    with:
      release_tag: ${{ needs.prepare_release.outputs.release_tag }}
    secrets: inherit