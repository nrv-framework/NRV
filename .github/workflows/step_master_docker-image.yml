name: Docker -- Build and Push Images on Release

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag, e.g. v1.3.3"
        required: true
        type: string

permissions:
  contents: read

jobs:
  docker:
    name: docker
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: nrv
            dockerfile: ./docker/nrv/Dockerfile
            repository: nrvframework/nrv
          - image_name: lab
            dockerfile: ./docker/lab/Dockerfile
            repository: nrvframework/lab

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.release_tag }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}