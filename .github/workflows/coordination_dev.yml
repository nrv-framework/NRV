name: Coordination -- dev branch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Type of version bump to apply on dev"
        required: false
        type: choice
        options:
          - test
          - patch
          - minor
          - major

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: coordination-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/step_dev_linter.yml

  bump_version:
    name: bump_version
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    needs: lint
    # permissions:
    #   contents: write
    uses: ./.github/workflows/step_dev_bump_version.yml
    with:
      bump_type: ${{ inputs.bump_type }}
    secrets: inherit


  promote_to_staging_pr:
    name: promote_to_staging_pr
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    needs: bump_version
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Create or update PR dev -> staging
        id: create_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'dev';
            const base = 'staging';

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base
            });

            if (prs.data.length > 0) {
              core.info(`PR already exists: #${prs.data[0].number}`);
              core.setOutput('pr_number', prs.data[0].number.toString());
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: 'Promote dev to staging',
              body: [
                'Automated promotion after successful dev qualification pipeline.',
                '',
                '- lint tests passed',
                '- Bump version done',
              ].join('\n')
            });

            core.setOutput('pr_number', created.data.number.toString());

  enable_auto_merge:
    name: enable_auto_merge
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    needs: promote_to_staging_pr
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Enable auto-merge on promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.promote_to_staging_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --merge
          fi
