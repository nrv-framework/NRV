name: Coordination -- dev branch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Type of version bump to apply on dev"
        required: false
        type: choice
        options:
          - test
          - patch
          - minor
          - major

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: coordination-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/step_dev_linter.yml

  bump_version:
    name: bump_version
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    needs: lint
    permissions:
      contents: write
    uses: ./.github/workflows/step_dev_bump_version.yml
    secrets: 
        APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        NRV_TOKEN_GITHUB: ${{ secrets.NRV_TOKEN_GITHUB }}
    with:
      bump_type: ${{ inputs.bump_type }}

  merge_to_staging:
    name: merge_to_staging
    if: github.event_name == 'workflow_dispatch' && inputs.bump_type != ''
    needs: bump_version
    uses: ./.github/workflows/step_dev_merge_to_staging.yml
    secrets: inherit
