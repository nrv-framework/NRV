name: Pytest -- Run end-to-end (e2e) tests

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: pytest-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e
    runs-on: self-hosted
    timeout-minutes: 90

    env:
      MAMBA_ROOT_PREFIX: /home/runner/micromamba
      ENV_NAME: nrv-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
            fetch-depth: 0          # get all history for tags
            ref: staging       # change branch if needed

      - name: Setup Miniconda with mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-variant: Miniforge3
          mamba-version: "*"
          auto-activate-base: false

      - name: Check micromamba
        run: |
          echo "MAMBA_ROOT_PREFIX=$MAMBA_ROOT_PREFIX"
          micromamba info

      - name: Create or update tests environment
        shell: bash
        run: |
          set -euo pipefail
          if micromamba env list | grep -qE "(^|[[:space:]])${ENV_NAME}([[:space:]]|$)"; then
            micromamba env update -n "${ENV_NAME}" -f conda/nrvdev_linux.yaml
          else
            micromamba create -n "${ENV_NAME}" -y -f conda/nrvdev_linux.yaml
          fi

      - name: Run end-to-end tests
        shell: bash
        run: |
          micromamba run -n "${ENV_NAME}" python -m pytest tests/e2e -q