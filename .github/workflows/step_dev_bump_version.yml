name: Release -- Bump Version

on:
  workflow_call:
    inputs:
      bump_type:
        description: "test | patch | minor | major"
        required: true
        type: string

permissions:
  contents: write # Job-level permissions configuration starts here

jobs:
  print-username:
    name: bump_version
    runs-on: ubuntu-latest

    steps:
        # - These steps allows action to push on dev branch -
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          # required
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: dev       # change branch if needed
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
        # ----------------------------------------------------

      - name: Version bump type
        run: echo Performing ${{ inputs.bump_type }}

      - name: Bump version
        run: |
            git branch
            pip install bump2version
            bump2version ${{ inputs.bump_type }}
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.NRV_TOKEN_GITHUB }}
        run: |
          git push origin dev
          git push origin dev --tags
