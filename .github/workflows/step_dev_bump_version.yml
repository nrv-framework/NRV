name: Release -- Bump Version

on:
  workflow_call:
    inputs:
      bump_type:
        description: "test | patch | minor | major"
        required: true
        type: string

permissions:
  contents: write # Job-level permissions configuration starts here

jobs:
  print-username:
    name: bump_version
    runs-on: ubuntu-latest

    steps:
      - name: Version bump type
        run: echo Performing ${{ inputs.bump_type }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: dev

      - name: Who am I
        run: gh api /user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Setup git user
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        run: |
            git branch
            pip install bump2version
            bump2version ${{ inputs.bump_type }}
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.NRV_TOKEN_GITHUB }}
        run: |
          git push origin dev
          git push origin dev --tags
