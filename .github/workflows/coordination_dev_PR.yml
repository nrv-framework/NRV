name: Coordination -- dev branch on Pull/Merge Request

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: coordination-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/step_dev_linter.yml