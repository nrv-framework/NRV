name: Release -- Bump Version

on:
  workflow_call:
    inputs:
      target_branch:
        description: "Branch to update"
        required: true
        type: string
      bump_type:
        description: "patch | minor | major"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump_version:
    name: bump_version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version in pyproject.toml
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          bump_type = "${{ inputs.bump_type }}"
          path = Path("pyproject.toml")
          content = path.read_text()

          m = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"$', content, re.MULTILINE)
          if not m:
              raise SystemExit("Unable to find version in pyproject.toml")

          major, minor, patch = map(int, m.groups())

          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          elif bump_type == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump_type: {bump_type}")

          new_version = f'{major}.{minor}.{patch}'
          updated = re.sub(
              r'^version = "\d+\.\d+\.\d+"$',
              f'version = "{new_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          path.write_text(updated)
          print(new_version)
          PY

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No version change to commit"
            exit 0
          fi

          NEW_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )

          git add pyproject.toml
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin HEAD:${{ inputs.target_branch }}