name: Dev -- Merge to staging

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
      NRV_TOKEN_GITHUB:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  promote_to_staging_pr:
    name: promote_to_staging_pr
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.promote.outputs.pr_number }}
    steps:
      - name: Create or update PR dev -> staging
        id: promote
        uses: actions/github-script@v7
        env: 
            GITHUB_TOKEN: ${{ secrets.NRV_TOKEN_GITHUB }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'dev';
            const base = 'staging';

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base
            });

            if (prs.data.length > 0) {
              core.info(`PR already exists: #${prs.data[0].number}`);
              core.setOutput('pr_number', prs.data[0].number.toString());
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: 'Promote dev to staging',
              body: [
                'Automated promotion after successful dev qualification pipeline.',
                '',
                '- lint tests passed',
                '- Bump version done',
              ].join('\n')
            });

            core.setOutput('pr_number', created.data.number.toString());

  enable_auto_merge:
    name: enable_auto_merge
    needs: promote_to_staging_pr
    runs-on: ubuntu-latest
    steps:
        # - These steps allows action to push on dev branch -
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          # required
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
        # ----------------------------------------------------
      - name: Enable auto-merge on promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.promote_to_staging_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --merge
          fi
