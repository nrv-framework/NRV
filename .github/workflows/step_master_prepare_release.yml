name: Release -- Prepare release

on:
  workflow_call:
    outputs:
      release_tag:
        description: "Release tag, e.g. v1.3.3"
        value: ${{ jobs.prepare_release.outputs.release_tag }}
    secrets:
      APP_PRIVATE_KEY:
        required: true
      NRV_TOKEN_GITHUB:
        required: true

permissions:
  contents: write

jobs:
  prepare_release:
    name: prepare_release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
        # - These steps allows action to push on dev branch -
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          # required
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: master
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # ----------------------------------------------------

      - name: Access release tag from pyproject.toml
        id: meta
        shell: bash
        run: |
          RELEASE_TAG=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print("v" + data["project"]["version"])
          PY
          )
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if missing
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"
          git fetch --tags
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            echo "Tag ${TAG} does not exist"
            git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
            git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} generated"
          fi
