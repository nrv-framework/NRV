# new configuration for docs since 1.3.0 to prevent from timeouts
# updated in march 2026 for actions on selfhosterd machine that prebuilds
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    build:
      html:
        - mkdir -p "$READTHEDOCS_OUTPUT/html"
        - test -d docs/html
        - cp -a docs/html/. "$READTHEDOCS_OUTPUT/html/"
